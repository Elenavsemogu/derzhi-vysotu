<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Держи Высоту — ещё варианты (для Лены)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --lime:#a3e635;--lime-d:#84cc16;
    --graphite:#26292e;
    --cream:#f6f6f1;--white:#fff;
    --radius:18px;
}
body{font-family:'Montserrat',system-ui,sans-serif;color:var(--graphite);background:var(--cream);-webkit-font-smoothing:antialiased}
h1,h2{font-family:'Unbounded',sans-serif;line-height:1.15}

.hero{text-align:center;padding:clamp(50px,8vw,90px) 24px clamp(30px,4vw,44px);max-width:840px;margin:0 auto}
.hero h1{font-size:clamp(24px,4.2vw,40px);font-weight:800;letter-spacing:-.01em}

.wrap{max-width:940px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 90px}

.variant{margin-bottom:40px}
.variant .label{
    display:inline-block;background:var(--graphite);color:var(--lime);
    font-family:'Unbounded';font-weight:700;font-size:13px;letter-spacing:1px;
    padding:8px 18px;border-radius:50px;margin-bottom:16px;
}
.card{
    display:grid;grid-template-columns:1fr 1fr;border-radius:var(--radius);overflow:hidden;
    border:1px solid rgba(0,0,0,.07);box-shadow:0 8px 30px rgba(0,0,0,.05);
}
@media(max-width:640px){.card{grid-template-columns:1fr}}
.pane{display:flex;align-items:center;justify-content:center;padding:44px 30px;min-height:250px}
.pane.light{background:var(--white)}
.pane.dark{background:var(--graphite)}
.pane svg{width:100%;max-width:300px;height:auto}
</style>
</head>
<body>

<div class="hero">
    <h1>Держи Высоту — ещё 3 варианта</h1>
</div>

<div class="wrap">

    <!-- Вариант 3 · Гора вместо «Д» -->
    <div class="variant">
        <div class="label">Вариант 3</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(150,44)">
                        <path d="M0 60 L30 6 L60 60 L60 60 L52 60 L52 74 L44 74 L44 60 L16 60 L16 74 L8 74 L8 60 Z" fill="#84cc16"/>
                        <path d="M30 6 L18 27 L26 23 L30 28 L34 23 L42 27 Z" fill="#ffffff"/>
                        <path d="M14 56 L22 44 L18 39 L28 22" fill="none" stroke="#26292e" stroke-width="2" stroke-dasharray="2.5 4" stroke-linecap="round" opacity=".55"/>
                        <circle cx="14" cy="56" r="2.6" fill="#26292e" opacity=".8"/>
                        <circle cx="22" cy="44" r="2.6" fill="#26292e" opacity=".8"/>
                        <circle cx="28" cy="22" r="3" fill="#26292e"/>
                    </g>
                    <text x="215" y="106" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="1" fill="#26292e">ЕРЖИ</text>
                    <text x="210" y="178" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="700" font-size="34" letter-spacing="8" fill="#84cc16">ВЫСОТУ</text>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(150,44)">
                        <path d="M0 60 L30 6 L60 60 L60 60 L52 60 L52 74 L44 74 L44 60 L16 60 L16 74 L8 74 L8 60 Z" fill="#a3e635"/>
                        <path d="M30 6 L18 27 L26 23 L30 28 L34 23 L42 27 Z" fill="#26292e"/>
                        <path d="M14 56 L22 44 L18 39 L28 22" fill="none" stroke="#26292e" stroke-width="2" stroke-dasharray="2.5 4" stroke-linecap="round" opacity=".7"/>
                        <circle cx="14" cy="56" r="2.6" fill="#26292e"/>
                        <circle cx="22" cy="44" r="2.6" fill="#26292e"/>
                        <circle cx="28" cy="22" r="3" fill="#26292e"/>
                    </g>
                    <text x="215" y="106" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="1" fill="#ffffff">ЕРЖИ</text>
                    <text x="210" y="178" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="700" font-size="34" letter-spacing="8" fill="#a3e635">ВЫСОТУ</text>
                </svg>
            </div>
        </div>
    </div>

    <!-- Вариант 4 · Монограмма «ДВ» -->
    <div class="variant">
        <div class="label">Вариант 4</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(120,42)">
                        <path d="M20 130 L20 70 Q20 40 50 40 Q80 40 80 70 Q80 100 50 100 L50 100 Q30 100 30 122
                                 M50 40 Q50 20 70 20 Q92 20 92 42 Q92 62 72 62 Q92 62 92 84 Q92 106 70 106 L52 106"
                              fill="none" stroke="#26292e" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="70" cy="12" r="8" fill="#84cc16"/>
                    </g>
                    <text x="270" y="118" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="27" fill="#26292e">ДЕРЖИ</text>
                    <text x="270" y="150" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="27" fill="#84cc16">ВЫСОТУ</text>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(120,42)">
                        <path d="M20 130 L20 70 Q20 40 50 40 Q80 40 80 70 Q80 100 50 100 L50 100 Q30 100 30 122
                                 M50 40 Q50 20 70 20 Q92 20 92 42 Q92 62 72 62 Q92 62 92 84 Q92 106 70 106 L52 106"
                              fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="70" cy="12" r="8" fill="#a3e635"/>
                    </g>
                    <text x="270" y="118" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="27" fill="#ffffff">ДЕРЖИ</text>
                    <text x="270" y="150" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="27" fill="#a3e635">ВЫСОТУ</text>
                </svg>
            </div>
        </div>
    </div>

    <!-- Вариант 5 · Строка идёт вверх -->
    <div class="variant">
        <div class="label">Вариант 5</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <path d="M40 175 L250 175 L360 60" fill="none" stroke="#a3e635" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M360 60 L342 60 M360 60 L360 78" fill="none" stroke="#a3e635" stroke-width="10" stroke-linecap="round"/>
                    <text x="46" y="150" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="40" letter-spacing="1" fill="#26292e">ДЕРЖИ</text>
                    <text x="150" y="96" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="40" letter-spacing="1" transform="rotate(-14 150 96)" fill="#26292e">ВЫСОТУ</text>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <path d="M40 175 L250 175 L360 60" fill="none" stroke="#a3e635" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M360 60 L342 60 M360 60 L360 78" fill="none" stroke="#a3e635" stroke-width="10" stroke-linecap="round"/>
                    <text x="46" y="150" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="40" letter-spacing="1" fill="#ffffff">ДЕРЖИ</text>
                    <text x="150" y="96" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="40" letter-spacing="1" transform="rotate(-14 150 96)" fill="#ffffff">ВЫСОТУ</text>
                </svg>
            </div>
        </div>
    </div>

</div>

</body>
</html>
