<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Держи Высоту — ещё варианты (для Лены)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --lime:#a3e635;--lime-d:#84cc16;
    --graphite:#26292e;
    --cream:#f6f6f1;--white:#fff;
    --radius:18px;
}
body{font-family:'Montserrat',system-ui,sans-serif;color:var(--graphite);background:var(--cream);-webkit-font-smoothing:antialiased}
h1,h2{font-family:'Unbounded',sans-serif;line-height:1.15}

.hero{text-align:center;padding:clamp(50px,8vw,90px) 24px clamp(30px,4vw,44px);max-width:840px;margin:0 auto}
.hero h1{font-size:clamp(24px,4.2vw,40px);font-weight:800;letter-spacing:-.01em}

.wrap{max-width:940px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 90px}

.variant{margin-bottom:40px}
.variant .label{
    display:inline-block;background:var(--graphite);color:var(--lime);
    font-family:'Unbounded';font-weight:700;font-size:13px;letter-spacing:1px;
    padding:8px 18px;border-radius:50px;margin-bottom:16px;
}
.card{
    display:grid;grid-template-columns:1fr 1fr;border-radius:var(--radius);overflow:hidden;
    border:1px solid rgba(0,0,0,.07);box-shadow:0 8px 30px rgba(0,0,0,.05);
}
@media(max-width:640px){.card{grid-template-columns:1fr}}
.pane{display:flex;align-items:center;justify-content:center;padding:44px 30px;min-height:250px}
.pane.light{background:var(--white)}
.pane.dark{background:var(--graphite)}
.pane svg{width:100%;max-width:300px;height:auto}
</style>
</head>
<body>

<div class="hero">
    <h1>Держи Высоту — ещё 3 варианта</h1>
</div>

<div class="wrap">

    <!-- Вариант 3 · Мешочек магнезии в «О» -->
    <div class="variant">
        <div class="label">Вариант 3</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="86" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#26292e">ДЕРЖИ</text>
                    <text x="194" y="168" text-anchor="end" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#26292e">ВЫС</text>
                    <g transform="translate(215,144)">
                        <path d="M -13 -20 L -15 -8 L 15 -8 L 13 -20 Z" fill="#84cc16"/>
                        <rect x="-21" y="-9" width="42" height="37" rx="18" fill="#84cc16"/>
                        <path d="M -14 -13 Q 0 -18 14 -13" fill="none" stroke="#26292e" stroke-width="3" stroke-linecap="round"/>
                        <path d="M -14 -13 L -21 -8 M 14 -13 L 21 -8" stroke="#26292e" stroke-width="3" stroke-linecap="round"/>
                    </g>
                    <text x="237" y="168" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#26292e">ТУ</text>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="86" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#ffffff">ДЕРЖИ</text>
                    <text x="194" y="168" text-anchor="end" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#ffffff">ВЫС</text>
                    <g transform="translate(215,144)">
                        <path d="M -13 -20 L -15 -8 L 15 -8 L 13 -20 Z" fill="#a3e635"/>
                        <rect x="-21" y="-9" width="42" height="37" rx="18" fill="#a3e635"/>
                        <path d="M -14 -13 Q 0 -18 14 -13" fill="none" stroke="#26292e" stroke-width="3" stroke-linecap="round"/>
                        <path d="M -14 -13 L -21 -8 M 14 -13 L 21 -8" stroke="#26292e" stroke-width="3" stroke-linecap="round"/>
                    </g>
                    <text x="237" y="168" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#ffffff">ТУ</text>
                </svg>
            </div>
        </div>
    </div>

    <!-- Вариант 4 · Связка (два кольца) в «О» -->
    <div class="variant">
        <div class="label">Вариант 4</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="86" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#26292e">ДЕРЖИ</text>
                    <text x="194" y="168" text-anchor="end" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#26292e">ВЫС</text>
                    <g transform="translate(215,146)">
                        <ellipse cx="-7" cy="0" rx="11" ry="22" fill="none" stroke="#26292e" stroke-width="7"/>
                        <ellipse cx="8" cy="0" rx="11" ry="22" fill="none" stroke="#84cc16" stroke-width="7"/>
                    </g>
                    <text x="238" y="168" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#26292e">ТУ</text>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="86" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#ffffff">ДЕРЖИ</text>
                    <text x="194" y="168" text-anchor="end" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#ffffff">ВЫС</text>
                    <g transform="translate(215,146)">
                        <ellipse cx="-7" cy="0" rx="11" ry="22" fill="none" stroke="#ffffff" stroke-width="7"/>
                        <ellipse cx="8" cy="0" rx="11" ry="22" fill="none" stroke="#a3e635" stroke-width="7"/>
                    </g>
                    <text x="238" y="168" text-anchor="start" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#ffffff">ТУ</text>
                </svg>
            </div>
        </div>
    </div>

    <!-- Вариант 5 · Слово между зацепами -->
    <div class="variant">
        <div class="label">Вариант 5</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(52,110) scale(1.15)">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#84cc16"/>
                    </g>
                    <g transform="translate(368,110) scale(-1.15,1.15)">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#84cc16"/>
                    </g>
                    <text x="210" y="98" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="44" letter-spacing="1" fill="#26292e">ДЕРЖИ</text>
                    <text x="210" y="150" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="44" letter-spacing="1" fill="#84cc16">ВЫСОТУ</text>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(52,110) scale(1.15)">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#a3e635"/>
                    </g>
                    <g transform="translate(368,110) scale(-1.15,1.15)">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#a3e635"/>
                    </g>
                    <text x="210" y="98" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="44" letter-spacing="1" fill="#ffffff">ДЕРЖИ</text>
                    <text x="210" y="150" text-anchor="middle" font-family="Unbounded,Montserrat,sans-serif" font-weight="800" font-size="44" letter-spacing="1" fill="#a3e635">ВЫСОТУ</text>
                </svg>
            </div>
        </div>
    </div>

</div>

</body>
</html>
