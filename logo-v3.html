<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Держи Высоту — предложения по логотипу</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800;900&family=Oswald:wght@500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --lime:#a3e635;--lime-d:#84cc16;
    --graphite:#26292e;
    --cream:#f6f6f1;--white:#fff;
    --radius:18px;
}
body{font-family:'Montserrat',system-ui,sans-serif;color:var(--graphite);background:var(--cream);-webkit-font-smoothing:antialiased}
h1,h2{font-family:'Unbounded',sans-serif;line-height:1.15}

.hero{text-align:center;padding:clamp(50px,8vw,90px) 24px clamp(30px,4vw,44px);max-width:840px;margin:0 auto}
.hero h1{font-size:clamp(24px,4.2vw,40px);font-weight:800;letter-spacing:-.01em}

.wrap{max-width:940px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 90px}

.variant{margin-bottom:40px}
.variant .label{
    display:inline-block;background:var(--graphite);color:var(--lime);
    font-family:'Unbounded';font-weight:700;font-size:13px;letter-spacing:1px;
    padding:8px 18px;border-radius:50px;margin-bottom:16px;
}
.card{
    display:grid;grid-template-columns:1fr 1fr;border-radius:var(--radius);overflow:hidden;
    border:1px solid rgba(0,0,0,.07);box-shadow:0 8px 30px rgba(0,0,0,.05);
}
@media(max-width:640px){.card{grid-template-columns:1fr}}
.pane{display:flex;align-items:center;justify-content:center;padding:44px 30px;min-height:250px}
.pane.light{background:var(--white)}
.pane.dark{background:var(--graphite)}
.pane svg{width:100%;max-width:300px;height:auto}

/* typography inside the logo — two mixed fonts */
.w1{font-family:'Unbounded','Montserrat',sans-serif;font-weight:800;font-size:40px;letter-spacing:1px}
.w2{font-family:'Oswald','Montserrat',sans-serif;font-weight:700;font-size:62px;letter-spacing:4px}
.slot{fill:transparent}
</style>
</head>
<body>

<div class="hero">
    <h1>Ксюша, вот тебе предложения по логотипам я не кусок говна)))</h1>
</div>

<div class="wrap">

    <!-- Вариант 1 · Карабин в «О» -->
    <div class="variant">
        <div class="label">Вариант 1</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="72" text-anchor="middle" class="w1" fill="#26292e">ДЕРЖИ</text>
                    <text x="210" y="176" text-anchor="middle" class="w2" fill="#26292e"><tspan>ВЫС</tspan><tspan class="slot" data-mark="cbn-l">О</tspan><tspan>ТУ</tspan></text>
                    <g id="cbn-l" class="mark">
                        <rect x="-13" y="-24" width="24" height="48" rx="12" fill="none" stroke="#84cc16" stroke-width="6"/>
                        <path d="M 6 -15 L 6 17" fill="none" stroke="#84cc16" stroke-width="5.5" stroke-linecap="round"/>
                        <path d="M 6 -15 L 11 -19" fill="none" stroke="#84cc16" stroke-width="5.5" stroke-linecap="round"/>
                        <circle cx="6" cy="19" r="2.7" fill="#84cc16"/>
                    </g>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="72" text-anchor="middle" class="w1" fill="#ffffff">ДЕРЖИ</text>
                    <text x="210" y="176" text-anchor="middle" class="w2" fill="#ffffff"><tspan>ВЫС</tspan><tspan class="slot" data-mark="cbn-d">О</tspan><tspan>ТУ</tspan></text>
                    <g id="cbn-d" class="mark">
                        <rect x="-13" y="-24" width="24" height="48" rx="12" fill="none" stroke="#a3e635" stroke-width="6"/>
                        <path d="M 6 -15 L 6 17" fill="none" stroke="#a3e635" stroke-width="5.5" stroke-linecap="round"/>
                        <path d="M 6 -15 L 11 -19" fill="none" stroke="#a3e635" stroke-width="5.5" stroke-linecap="round"/>
                        <circle cx="6" cy="19" r="2.7" fill="#a3e635"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <!-- Вариант 2 · Зацеп в «О» -->
    <div class="variant">
        <div class="label">Вариант 2</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="72" text-anchor="middle" class="w1" fill="#26292e">ДЕРЖИ</text>
                    <text x="210" y="176" text-anchor="middle" class="w2" fill="#26292e"><tspan>ВЫС</tspan><tspan class="slot" data-mark="hld-l">О</tspan><tspan>ТУ</tspan></text>
                    <g id="hld-l" class="mark">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#84cc16"/>
                        <ellipse cx="-4" cy="-6" rx="6" ry="7" fill="#26292e" opacity=".85"/>
                        <ellipse cx="9" cy="6" rx="3.4" ry="4" fill="#26292e" opacity=".55"/>
                    </g>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="72" text-anchor="middle" class="w1" fill="#ffffff">ДЕРЖИ</text>
                    <text x="210" y="176" text-anchor="middle" class="w2" fill="#ffffff"><tspan>ВЫС</tspan><tspan class="slot" data-mark="hld-d">О</tspan><tspan>ТУ</tspan></text>
                    <g id="hld-d" class="mark">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#a3e635"/>
                        <ellipse cx="-4" cy="-6" rx="6" ry="7" fill="#26292e"/>
                        <ellipse cx="9" cy="6" rx="3.4" ry="4" fill="#26292e" opacity=".7"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <!-- Вариант 3 · Слово между зацепами -->
    <div class="variant">
        <div class="label">Вариант 3</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(50,112) scale(1.2)">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#84cc16"/>
                    </g>
                    <g transform="translate(370,112) scale(-1.2,1.2)">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#84cc16"/>
                    </g>
                    <text x="210" y="92" text-anchor="middle" class="w1" fill="#26292e">ДЕРЖИ</text>
                    <text x="210" y="158" text-anchor="middle" class="w2" style="font-size:48px" fill="#84cc16">ВЫСОТУ</text>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(50,112) scale(1.2)">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#a3e635"/>
                    </g>
                    <g transform="translate(370,112) scale(-1.2,1.2)">
                        <path d="M -20 6 C -22 -14 -8 -25 4 -24 C 20 -22 24 -6 20 8 C 17 18 5 20 -6 19 C -16 18 -19 15 -20 6 Z" fill="#a3e635"/>
                    </g>
                    <text x="210" y="92" text-anchor="middle" class="w1" fill="#ffffff">ДЕРЖИ</text>
                    <text x="210" y="158" text-anchor="middle" class="w2" style="font-size:48px" fill="#a3e635">ВЫСОТУ</text>
                </svg>
            </div>
        </div>
    </div>

</div>

<script>
function placeMarks(){
    document.querySelectorAll('.slot').forEach(function(slot){
        var svg = slot.ownerSVGElement;
        var mark = svg.getElementById(slot.getAttribute('data-mark'));
        if(!mark) return;
        var sb = slot.getBBox();
        var mb = mark.getBBox();
        var cx = sb.x + sb.width/2;
        var cy = sb.y + sb.height/2;
        var mcx = mb.x + mb.width/2;
        var mcy = mb.y + mb.height/2;
        var scale = (sb.height * 1.02) / mb.height;   // match letter height
        mark.setAttribute('transform',
            'translate(' + cx + ' ' + cy + ') scale(' + scale + ') translate(' + (-mcx) + ' ' + (-mcy) + ')');
    });
}
if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(placeMarks);
    setTimeout(placeMarks, 400);
}else{
    window.addEventListener('load', placeMarks);
}
</script>

</body>
</html>
