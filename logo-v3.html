<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Держи Высоту — предложения по логотипу</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --lime:#a3e635;--lime-d:#84cc16;
    --graphite:#26292e;
    --cream:#f6f6f1;--white:#fff;
    --radius:18px;
}
body{font-family:'Montserrat',system-ui,sans-serif;color:var(--graphite);background:var(--cream);-webkit-font-smoothing:antialiased}
h1{font-family:'Unbounded',sans-serif;line-height:1.15}

.hero{text-align:center;padding:clamp(50px,8vw,90px) 24px clamp(30px,4vw,44px);max-width:840px;margin:0 auto}
.hero h1{font-size:clamp(24px,4.2vw,40px);font-weight:800;letter-spacing:-.01em}

.wrap{max-width:940px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 90px}

.variant{margin-bottom:40px}
.variant .label{
    display:inline-block;background:var(--graphite);color:var(--lime);
    font-family:'Unbounded';font-weight:700;font-size:13px;letter-spacing:1px;
    padding:8px 18px;border-radius:50px;margin-bottom:16px;
}
.card{
    display:grid;grid-template-columns:1fr 1fr;border-radius:var(--radius);overflow:hidden;
    border:1px solid rgba(0,0,0,.07);box-shadow:0 8px 30px rgba(0,0,0,.05);
}
@media(max-width:640px){.card{grid-template-columns:1fr}}
.pane{display:flex;align-items:center;justify-content:center;padding:44px 30px;min-height:250px}
.pane.light{background:var(--white)}
.pane.dark{background:var(--graphite)}
.pane svg{width:100%;max-width:300px;height:auto}

/* один шрифт для всего логотипа */
.lg{font-family:'Unbounded','Montserrat',sans-serif;font-weight:800}
</style>
</head>
<body>

<div class="hero">
    <h1>Ксюша, вот тебе предложения по логотипам я не кусок говна)))</h1>
</div>

<div class="wrap">

    <!-- Вариант 1 · Карабин в «О» -->
    <div class="variant">
        <div class="label">Вариант 1</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="86" text-anchor="middle" class="lg" font-size="52" fill="#26292e">ДЕРЖИ</text>
                    <text x="217.9" y="168" text-anchor="end" class="lg" font-size="52" fill="#26292e">ВЫС</text>
                    <text x="266.9" y="168" text-anchor="start" class="lg" font-size="52" fill="#26292e">ТУ</text>
                    <g transform="translate(242.4,146)">
                        <ellipse cx="0" cy="0" rx="17" ry="24" fill="none" stroke="#84cc16" stroke-width="8"/>
                        <path d="M -6 -22 L 9 -14" stroke="#84cc16" stroke-width="6" stroke-linecap="round"/>
                        <circle cx="9" cy="-14" r="3.4" fill="#84cc16"/>
                    </g>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="86" text-anchor="middle" class="lg" font-size="52" fill="#ffffff">ДЕРЖИ</text>
                    <text x="217.9" y="168" text-anchor="end" class="lg" font-size="52" fill="#ffffff">ВЫС</text>
                    <text x="266.9" y="168" text-anchor="start" class="lg" font-size="52" fill="#ffffff">ТУ</text>
                    <g transform="translate(242.4,146)">
                        <ellipse cx="0" cy="0" rx="17" ry="24" fill="none" stroke="#a3e635" stroke-width="8"/>
                        <path d="M -6 -22 L 9 -14" stroke="#a3e635" stroke-width="6" stroke-linecap="round"/>
                        <circle cx="9" cy="-14" r="3.4" fill="#a3e635"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <!-- Вариант 2 · Зацеп в «О» -->
    <div class="variant">
        <div class="label">Вариант 2</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="86" text-anchor="middle" class="lg" font-size="52" fill="#26292e">ДЕРЖИ</text>
                    <text x="217.9" y="168" text-anchor="end" class="lg" font-size="52" fill="#26292e">ВЫС</text>
                    <text x="266.9" y="168" text-anchor="start" class="lg" font-size="52" fill="#26292e">ТУ</text>
                    <g transform="translate(242.4,147)">
                        <path d="M -16 6 C -18 -12 -7 -22 4 -21 C 18 -20 22 -5 18 7 C 15 17 4 19 -6 18 C -14 17 -15 14 -16 6 Z" fill="#84cc16"/>
                        <ellipse cx="-3" cy="-5" rx="5" ry="6" fill="#26292e" opacity=".85"/>
                        <ellipse cx="8" cy="6" rx="3" ry="3.6" fill="#26292e" opacity=".55"/>
                    </g>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="86" text-anchor="middle" class="lg" font-size="52" fill="#ffffff">ДЕРЖИ</text>
                    <text x="217.9" y="168" text-anchor="end" class="lg" font-size="52" fill="#ffffff">ВЫС</text>
                    <text x="266.9" y="168" text-anchor="start" class="lg" font-size="52" fill="#ffffff">ТУ</text>
                    <g transform="translate(242.4,147)">
                        <path d="M -16 6 C -18 -12 -7 -22 4 -21 C 18 -20 22 -5 18 7 C 15 17 4 19 -6 18 C -14 17 -15 14 -16 6 Z" fill="#a3e635"/>
                        <ellipse cx="-3" cy="-5" rx="5" ry="6" fill="#26292e"/>
                        <ellipse cx="8" cy="6" rx="3" ry="3.6" fill="#26292e" opacity=".65"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <!-- Вариант 3 · Слово между зацепами -->
    <div class="variant">
        <div class="label">Вариант 3</div>
        <div class="card">
            <div class="pane light">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(50,112) scale(1.4)">
                        <path d="M -16 6 C -18 -12 -7 -22 4 -21 C 18 -20 22 -5 18 7 C 15 17 4 19 -6 18 C -14 17 -15 14 -16 6 Z" fill="#84cc16"/>
                        <ellipse cx="-3" cy="-5" rx="5" ry="6" fill="#26292e" opacity=".85"/>
                        <ellipse cx="8" cy="6" rx="3" ry="3.6" fill="#26292e" opacity=".55"/>
                    </g>
                    <g transform="translate(370,112) scale(-1.4,1.4)">
                        <path d="M -16 6 C -18 -12 -7 -22 4 -21 C 18 -20 22 -5 18 7 C 15 17 4 19 -6 18 C -14 17 -15 14 -16 6 Z" fill="#84cc16"/>
                        <ellipse cx="-3" cy="-5" rx="5" ry="6" fill="#26292e" opacity=".85"/>
                        <ellipse cx="8" cy="6" rx="3" ry="3.6" fill="#26292e" opacity=".55"/>
                    </g>
                    <text x="210" y="96" text-anchor="middle" class="lg" font-size="40" fill="#26292e">ДЕРЖИ</text>
                    <text x="210" y="150" text-anchor="middle" class="lg" font-size="40" fill="#84cc16">ВЫСОТУ</text>
                </svg>
            </div>
            <div class="pane dark">
                <svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(50,112) scale(1.4)">
                        <path d="M -16 6 C -18 -12 -7 -22 4 -21 C 18 -20 22 -5 18 7 C 15 17 4 19 -6 18 C -14 17 -15 14 -16 6 Z" fill="#a3e635"/>
                        <ellipse cx="-3" cy="-5" rx="5" ry="6" fill="#26292e"/>
                        <ellipse cx="8" cy="6" rx="3" ry="3.6" fill="#26292e" opacity=".65"/>
                    </g>
                    <g transform="translate(370,112) scale(-1.4,1.4)">
                        <path d="M -16 6 C -18 -12 -7 -22 4 -21 C 18 -20 22 -5 18 7 C 15 17 4 19 -6 18 C -14 17 -15 14 -16 6 Z" fill="#a3e635"/>
                        <ellipse cx="-3" cy="-5" rx="5" ry="6" fill="#26292e"/>
                        <ellipse cx="8" cy="6" rx="3" ry="3.6" fill="#26292e" opacity=".65"/>
                    </g>
                    <text x="210" y="96" text-anchor="middle" class="lg" font-size="40" fill="#ffffff">ДЕРЖИ</text>
                    <text x="210" y="150" text-anchor="middle" class="lg" font-size="40" fill="#a3e635">ВЫСОТУ</text>
                </svg>
            </div>
        </div>
    </div>

</div>

</body>
</html>
